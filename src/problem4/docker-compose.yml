version: "3.9"

# Reusable logging config
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# Network isolation
networks:
  frontend:
  backend:

services:
  nginx:
    image: nginx:1.25-alpine

    ports:
      - "8080:80"

    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      api:
        condition: service_healthy

    networks:
      - frontend
      - backend

    read_only: true

    # Healthcheck for reverse proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

    restart: unless-stopped
    logging: *default-logging

  api:
    build:
      context: ./api

    # Externalize secrets/config
    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - backend

    # App-level health endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/status"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    logging: *default-logging

  postgres:
    image: postgres:15-alpine

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    networks:
      - backend

    # Readiness check for DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine

    volumes:
      - redis_data:/data

    networks:
      - backend

    # Ensure Redis responsiveness
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
